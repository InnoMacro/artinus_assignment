spring:
  application:
    name: backend
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/subscription?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:subscription}
    password: ${DB_PASSWORD:subscription}
    hikari:
      connection-timeout: 3000
      maximum-pool-size: 10
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
      jakarta:
        persistence:
          lock:
            timeout: 2000

external:
  csrng:
    base-url: ${CSRNG_BASE_URL:https://csrng.net}
    connect-timeout: ${CSRNG_CONNECT_TIMEOUT:1s}
    read-timeout: ${CSRNG_READ_TIMEOUT:2s}

resilience4j:
  retry:
    instances:
      csrng:
        max-attempts: 2
        wait-duration: 100ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 1s
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        retry-exceptions:
          - org.artinus.backend.subscription.adapter.outbound.csrng.CsrngUnavailableException
        ignore-exceptions:
          - org.artinus.backend.subscription.adapter.outbound.csrng.CsrngInvalidResponseException
  circuitbreaker:
    instances:
      csrng:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - org.artinus.backend.subscription.adapter.outbound.csrng.CsrngUnavailableException
        ignore-exceptions:
          - org.artinus.backend.subscription.adapter.outbound.csrng.CsrngInvalidResponseException

logging:
  level:
    org.hibernate.SQL: debug
