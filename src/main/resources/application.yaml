spring:
  application:
    name: backend
  main:
    keep-alive: true
  threads:
    virtual:
      enabled: true
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/subscription?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:application}
    password: ${DB_PASSWORD:application}
    hikari:
      connection-timeout: 3000
      maximum-pool-size: 10
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
      jakarta:
        persistence:
          lock:
            timeout: 2000
  ai:
    model:
      chat: ${AI_CHAT_PROVIDER:none}
      embedding: none
      image: none
      audio:
        speech: none
        transcription: none
      moderation: none
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        timeout: ${SUBSCRIPTION_HISTORY_AI_TIMEOUT:3s}
        max-retries: ${SUBSCRIPTION_HISTORY_AI_MAX_RETRIES:0}

app:
  ai:
    subscription-history-summary:
      model: ${SUBSCRIPTION_HISTORY_AI_MODEL:gpt-4o-mini}
      model-profile: ${SUBSCRIPTION_HISTORY_AI_MODEL_PROFILE:STANDARD}
      temperature: ${SUBSCRIPTION_HISTORY_AI_TEMPERATURE:0.0}
      max-output-tokens: ${SUBSCRIPTION_HISTORY_AI_MAX_OUTPUT_TOKENS:300}
      max-history-items: ${SUBSCRIPTION_HISTORY_AI_MAX_HISTORY_ITEMS:100}
      reasoning-effort: ${SUBSCRIPTION_HISTORY_AI_REASONING_EFFORT:LOW}
      prompt-cache-key: ${SUBSCRIPTION_HISTORY_AI_PROMPT_CACHE_KEY:subscription-history-summary-v1}

external:
  csrng:
    base-url: ${CSRNG_BASE_URL:https://csrng.net}
    connect-timeout: ${CSRNG_CONNECT_TIMEOUT:1s}
    read-timeout: ${CSRNG_READ_TIMEOUT:2s}

resilience4j:
  bulkhead:
    instances:
      subscriptionHistoryAi:
        max-concurrent-calls: ${SUBSCRIPTION_HISTORY_AI_MAX_CONCURRENT_CALLS:8}
        max-wait-duration: 0ms
        writable-stack-trace-enabled: false
  retry:
    instances:
      csrng:
        max-attempts: 2
        wait-duration: 100ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 1s
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        retry-exceptions:
          - org.artinus.backend.subscription.adapter.outbound.csrng.exception.CsrngUnavailableException
        ignore-exceptions:
          - org.artinus.backend.subscription.adapter.outbound.csrng.exception.CsrngInvalidResponseException
  circuitbreaker:
    instances:
      csrng:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - org.artinus.backend.subscription.adapter.outbound.csrng.exception.CsrngUnavailableException
        ignore-exceptions:
          - org.artinus.backend.subscription.adapter.outbound.csrng.exception.CsrngInvalidResponseException
      subscriptionHistoryAi:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true

logging:
  level:
    org.hibernate.SQL: debug

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
