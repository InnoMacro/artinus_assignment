services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME:-subscription}
      MYSQL_USER: ${DB_USERNAME:-application}
      MYSQL_PASSWORD: ${DB_PASSWORD:-application}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-local-root-password}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - subscription-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/${DB_NAME:-subscription}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
      DB_USERNAME: ${DB_USERNAME:-application}
      DB_PASSWORD: ${DB_PASSWORD:-application}
      CSRNG_BASE_URL: ${CSRNG_BASE_URL:-https://csrng.net}
      CSRNG_CONNECT_TIMEOUT: ${CSRNG_CONNECT_TIMEOUT:-1s}
      CSRNG_READ_TIMEOUT: ${CSRNG_READ_TIMEOUT:-2s}
      AI_CHAT_PROVIDER: ${AI_CHAT_PROVIDER:-none}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SUBSCRIPTION_HISTORY_AI_MODEL: ${SUBSCRIPTION_HISTORY_AI_MODEL:-gpt-4o-mini}
      SUBSCRIPTION_HISTORY_AI_MODEL_PROFILE: ${SUBSCRIPTION_HISTORY_AI_MODEL_PROFILE:-STANDARD}
      SUBSCRIPTION_HISTORY_AI_TEMPERATURE: ${SUBSCRIPTION_HISTORY_AI_TEMPERATURE:-0.0}
      SUBSCRIPTION_HISTORY_AI_MAX_OUTPUT_TOKENS: ${SUBSCRIPTION_HISTORY_AI_MAX_OUTPUT_TOKENS:-300}
      SUBSCRIPTION_HISTORY_AI_MAX_HISTORY_ITEMS: ${SUBSCRIPTION_HISTORY_AI_MAX_HISTORY_ITEMS:-100}
      SUBSCRIPTION_HISTORY_AI_REASONING_EFFORT: ${SUBSCRIPTION_HISTORY_AI_REASONING_EFFORT:-LOW}
      SUBSCRIPTION_HISTORY_AI_MAX_CONCURRENT_CALLS: ${SUBSCRIPTION_HISTORY_AI_MAX_CONCURRENT_CALLS:-8}
      SUBSCRIPTION_HISTORY_AI_PROMPT_CACHE_KEY: ${SUBSCRIPTION_HISTORY_AI_PROMPT_CACHE_KEY:-subscription-history-summary-v1}
      SUBSCRIPTION_HISTORY_AI_TIMEOUT: ${SUBSCRIPTION_HISTORY_AI_TIMEOUT:-3s}
      SUBSCRIPTION_HISTORY_AI_MAX_RETRIES: ${SUBSCRIPTION_HISTORY_AI_MAX_RETRIES:-0}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    init: true
    restart: unless-stopped

volumes:
  subscription-mysql-data:
